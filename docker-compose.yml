# docker-compose.yml — local development environment
# Run: docker-compose up -d postgres
# Then start the Spring Boot app normally from your IDE or with ./mvnw spring-boot:run

version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine         # alpine = minimal image, smaller attack surface
    environment:
      POSTGRES_DB: fleet_maintenance
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5433:5432"                   # host:container — 5432 is taken by local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persists data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_maintenance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ─────────────────────────────────────────────────────────
  # Only needed when running the full stack as containers (e.g., staging)
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: fleet
      DB_PASSWORD: fleet
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fleet_maintenance
    depends_on:
      postgres:
        condition: service_healthy   # waits for healthcheck to pass before starting app

volumes:
  postgres_data:
