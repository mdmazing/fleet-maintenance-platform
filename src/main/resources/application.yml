spring:
  application:
    name: fleet-maintenance

  datasource:
    url: jdbc:postgresql://localhost:5433/fleet_maintenance
    username: ${DB_USERNAME:fleet}
    password: ${DB_PASSWORD:fleet}

  jpa:
    hibernate:
      ddl-auto: validate
    # Disable the open-session-in-view anti-pattern.
    # All lazy loading must happen inside a @Transactional boundary.
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Fleet-specific configuration
fleet:
  scheduler:
    # Interval between maintenance-trigger checks (milliseconds). Default: 5 minutes.
    check-interval-ms: 300000

logging:
  level:
    com.fleet.maintenance: INFO
    org.flywaydb: INFO
