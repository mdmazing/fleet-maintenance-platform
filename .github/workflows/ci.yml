name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Testcontainers starts its own PostgreSQL Docker container during the test phase.
      # No external service block is needed — Docker is available on ubuntu-latest.
      - name: Build and test
        run: mvn verify --no-transfer-progress

      - name: Build Docker image (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: docker build -t fleet-maintenance:${{ github.sha }} .
